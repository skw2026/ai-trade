system:
  id: "bot-bybit-demo-s5"
  mode: "paper"
  primary_symbol: "SOLUSDT"
  data_path: "./data/demo_s5"
  max_ticks: 0
  status_log_interval_ticks: 20
  remote_risk_refresh_interval_ticks: 10
  reconcile:
    enabled: true
    interval_ticks: 10
    tolerance_notional_usd: 8.0
    mismatch_confirmations: 4
    pending_order_stale_ms: 15000
    anomaly_reduce_only_streak: 3
    anomaly_halt_streak: 6
    anomaly_resume_streak: 3

exchange:
  platform: "bybit"
  bybit:
    testnet: false
    demo_trading: true
    category: "linear"
    account_type: "UNIFIED"
    expected_account_mode: "UNIFIED"
    expected_margin_mode: "ISOLATED"
    expected_position_mode: "ONE_WAY"
    public_ws_enabled: true
    public_ws_rest_fallback: true
    private_ws_enabled: true
    private_ws_rest_fallback: true
    ws_reconnect_interval_ms: 15000
    execution_poll_limit: 50

risk:
  max_abs_notional_usd: 1800
  max_drawdown:
    degraded_threshold: 0.08
    degraded_recover_threshold: 0.06
    cooldown_threshold: 0.12
    cooldown_recover_threshold: 0.10
    fuse_threshold: 0.20
    fuse_recover_threshold: 0.16

execution:
  max_order_notional: 380
  min_rebalance_notional_usd: 80
  same_side_rebalance_multiplier: 2.0
  include_inflight_notional_in_position: true
  max_inflight_orders_per_symbol_direction: 2
  min_order_interval_ms: 8000
  reverse_signal_cooldown_ticks: 16
  enable_fee_aware_entry_gate: true
  entry_fee_bps: 5.5
  exit_fee_bps: 5.5
  expected_slippage_bps: 1.0
  min_expected_edge_bps: 1.3
  # 0=关闭上限；代码会强制不低于 round-trip cost + min_expected_edge。
  required_edge_cap_bps: 0.0
  entry_gate_near_miss_tolerance_bps: 0.30
  # 运行时代码仅允许 TREND 桶 near-miss maker 放行；RANGE 继续强过滤。
  entry_gate_near_miss_maker_allow: true
  entry_gate_near_miss_maker_max_gap_bps: 0.40
  adaptive_fee_gate_enabled: true
  adaptive_fee_gate_min_samples: 80
  adaptive_fee_gate_trigger_ratio: 0.58
  adaptive_fee_gate_max_relax_bps: 2.4
  dynamic_edge_enabled: true
  dynamic_edge_regime_trend_relax_bps: 0.8
  dynamic_edge_regime_range_penalty_bps: 0.80
  dynamic_edge_regime_extreme_penalty_bps: 2.0
  dynamic_edge_volatility_relax_bps: 0.6
  dynamic_edge_volatility_penalty_bps: 1.0
  dynamic_edge_liquidity_maker_ratio_threshold: 0.65
  dynamic_edge_liquidity_unknown_ratio_threshold: 0.20
  dynamic_edge_liquidity_relax_bps: 0.35
  dynamic_edge_liquidity_penalty_bps: 1.0
  maker_entry_enabled: true
  maker_fallback_to_market: false
  maker_price_offset_bps: 0.3
  maker_post_only: true
  maker_edge_relax_bps: 0.35
  cost_filter_cooldown_trigger_count: 24
  cost_filter_cooldown_ticks: 40
  # 普通策略 reduce 必须先覆盖预计出场成本；SL/TP/风控 reduce-only 不受此保护影响。
  strategy_reduce_cost_guard_enabled: true
  strategy_reduce_min_net_bps: 0.5
  strategy_reduce_max_adverse_bps: 18.0
  strategy_reduce_guard_max_hold_ticks: 720
  candidate_probe_enabled: true
  candidate_probe_min_trend_ratio: 0.60
  candidate_probe_strong_min_trend_ratio: 0.64
  candidate_probe_notional_usd: 80.0
  candidate_probe_max_edge_gap_bps: 5.5
  # 仅用于 TREND_CANDIDATE 取样：趋势够强且仍有正 edge 时，允许小额 maker canary
  # 穿过主成本门，解决“有候选趋势但永远无成交样本”的闭环盲区。
  candidate_probe_diagnostic_canary_enabled: true
  candidate_probe_diagnostic_min_trend_ratio: 0.70
  candidate_probe_diagnostic_max_edge_gap_bps: 10.0
  candidate_probe_diagnostic_min_expected_edge_bps: 0.5
  # 质量记忆期只允许强趋势小额 recovery probe，避免一亏损就永久隔离该币对。
  candidate_probe_memory_max_edge_gap_bps: 5.0
  candidate_probe_memory_min_trend_ratio: 0.74
  # probe 仓位是取样仓，不用等普通 reduce 的 18bps adverse cut 才承认失败。
  # 同时要求策略 reduce 至少有更厚净收益空间，避免 flat 残仓在噪声微利区过早收掉 probe。
  candidate_probe_reduce_min_net_bps: 4.0
  candidate_probe_reduce_max_adverse_bps: 8.0
  candidate_probe_cooldown_ticks: 120
  candidate_probe_max_per_window: 3
  # maker probe 必须有生命周期：超时先撤单，撤单确认后最多重挂一次；
  # 只有极强候选趋势才允许小额 taker fallback，避免长期“挂单无成交=无样本”。
  candidate_probe_post_only_timeout_ticks: 6
  candidate_probe_reprice_max_attempts: 1
  candidate_probe_reprice_bps: 0.15
  candidate_probe_taker_fallback_enabled: true
  candidate_probe_taker_fallback_min_trend_ratio: 1.05
  quality_guard_enabled: true
  quality_guard_min_fills: 4
  quality_guard_bad_streak_to_trigger: 1
  quality_guard_good_streak_to_release: 3
  quality_guard_min_realized_net_per_fill_usd: 0.0
  quality_guard_max_fee_bps_per_fill: 6.0
  quality_guard_required_edge_penalty_bps: 0.8
  quality_guard_required_edge_floor_bps: 5.8
  concentration_top1_share_threshold: 0.62
  concentration_penalty_bps: 2.8
  concentration_min_symbols: 2
  protection:
    enabled: true
    require_sl: true
    enable_tp: true
    attach_timeout_ms: 1500
    stop_loss_ratio: 0.01
    # 最近 live/replay 都显示 path MFE 给过空间但 exit capture 偏低。
    # 提前保本/trailing，并允许新保护单初挂时直接 armed，优先把浮盈锁成净收益样本。
    take_profit_ratio: 0.0050
    dynamic_distance_enabled: true
    dynamic_distance_volatility_multiplier: 72.0
    dynamic_stop_loss_min_ratio: 0.008
    dynamic_stop_loss_max_ratio: 0.025
    dynamic_take_profit_min_ratio: 0.0040
    dynamic_take_profit_max_ratio: 0.012
    dynamic_take_profit_rr_multiplier: 0.75
    break_even_enabled: true
    break_even_trigger_ratio: 0.0018
    break_even_offset_ratio: 0.0010
    trailing_enabled: true
    trailing_trigger_ratio: 0.0028
    trailing_distance_ratio: 0.0014
    profit_protection_min_update_ratio: 0.00025
    profit_protection_immediate_reduce_enabled: true
    profit_protection_immediate_min_net_bps: 0.8

strategy:
  signal_notional_usd: 380
  signal_deadband_abs: 0.0
  signal_deadband_bps: 3.0
  signal_valid_for_ms: 15000
  default_tick_interval_ms: 5000
  min_hold_ticks: 18
  # RANGE 桶保留小样本通道，避免 defensive 分支被结构性清零。
  # 当前 RANGE 理论置信上限 = trend_range_scale + defensive_notional_ratio * defensive_range_scale = 0.154。
  range_min_confidence: 0.15
  extreme_block_signals: true
  trend_breakout_lookback_ticks: 24
  trend_breakout_rank_threshold: 0.95
  trend_slope_lookback_ticks: 6
  trend_slope_min_abs: 0.00002
  trend_vol_cap_annual: 1.20
  trend_strength_scale: 1.5
  trend_trend_scale: 1.0
  trend_range_scale: 0.10
  trend_extreme_scale: 0.0
  vol_target_pct: 0.35
  vol_target_max_leverage: 2.2
  vol_target_low_vol_leverage_cap_enabled: true
  vol_target_low_vol_annual_threshold: 0.12
  vol_target_low_vol_max_leverage: 1.1
  defensive_notional_ratio: 0.30
  # rank 信号范围固定在 [-2,2]；门槛需留在可触达区间。
  defensive_entry_score: 1.40
  defensive_rank_lookback_ticks: 72
  defensive_trend_scale: 0.25
  defensive_range_scale: 0.18
  defensive_extreme_scale: 0.00
  eth_range_defensive_scale_multiplier: 0.10

integrator:
  enabled: true
  model_type: "catboost"
  active_confidence_threshold: 0.55
  active_partial_notional_ratio: 0.5
  active_full_notional_confidence_threshold: 0.80
  canary_min_notional_usd: 50
  shadow:
    enabled: true
    log_model_score: true
    model_report_path: "./data/research/integrator_report.json"
    score_gain: 1.0
    feature_window_ticks: 300

self_evolution:
  enabled: true
  # S5 优化：缩短评估窗口，提升可观测动作频率。
  update_interval_ticks: 600
  min_update_interval_ticks: 600
  # 允许小盈亏窗口也参与学习，减少长期 skipped。
  min_abs_window_pnl_usd: 0.5
  min_bucket_ticks_for_update: 60
  min_consecutive_direction_windows: 2
  # 以虚拟PnL学习，避免“零成交=零学习”死锁。
  use_virtual_pnl: true
  use_counterfactual_search: true
  counterfactual_fallback_to_factor_ic: true
  counterfactual_min_improvement_usd: 0.08
  counterfactual_improvement_decay_per_filtered_signal_usd: 0.08
  counterfactual_min_fill_count_for_update: 1
  counterfactual_min_t_stat_samples_for_update: 60
  counterfactual_min_t_stat_abs_for_update: 0.20
  counterfactual_superiority_min_samples_for_update: 80
  counterfactual_superiority_min_t_stat_for_update: 0.25
  virtual_cost_bps: 6.5
  virtual_cost_dynamic_enabled: true
  virtual_cost_dynamic_max_multiplier: 3.0
  virtual_funding_rate_per_tick: 0.00000002
  # 信号层：基于在线因子IC做权重自适应（与反事实搜索互补观测）。
  enable_factor_ic_adaptive_weights: true
  factor_ic_min_samples: 60
  factor_ic_min_abs: 0.005
  factor_ic_deadzone_abs: 0.02
  # 元控制层：仅在可学习窗口（|t-stat| 足够）允许更新。
  enable_learnability_gate: true
  learnability_min_samples: 60
  learnability_min_t_stat_abs: 0.6
  min_effective_weight_delta: 0.003
  objective_alpha_pnl: 1.0
  objective_beta_drawdown: 1.0
  objective_gamma_notional_churn: 0.008
  objective_use_sharpe_like: true
  max_single_strategy_weight: 0.55
  max_weight_step: 0.01
  rollback_degrade_windows: 3
  rollback_degrade_threshold_score: -15.0
  rollback_to_baseline_on_trigger: false
  rollback_cooldown_ticks: 3600
  initial_trend_weight: 0.50
  initial_defensive_weight: 0.50

regime:
  enabled: true
  warmup_ticks: 30
  ewma_alpha: 0.05
  bar_interval_ms: 5000
  switch_confirm_ticks: 3
  extreme_requires_both: true
  # 5s 聚合下 live 的 trend_strength 峰值长期落在 0.0002~0.00037 区间；
  # 先小幅下调阈值，恢复 TREND 样本而不过早放松 fee gate。
  trend_threshold: 0.0003
  extreme_threshold: 0.0080
  volatility_threshold: 0.0025

gate:
  # S5 稳态 soak：更关注“策略持续运行”而不是强交易频次。
  min_effective_signals_per_day: 2
  min_fills_per_day: 0
  heartbeat_empty_signal_ticks: 36
  window_ticks: 288
  allow_policy_flat_windows: true
  enforce_runtime_actions: false
  fail_to_reduce_only_windows: 2
  fail_to_halt_windows: 4
  reduce_only_cooldown_ticks: 120
  halt_cooldown_ticks: 240
  pass_to_resume_windows: 2

universe:
  enabled: true
  update_interval_ticks: 20
  max_active_symbols: 1
  min_active_symbols: 1
  trend_reserve_enabled: true
  trend_reserve_slots: 1
  trend_reserve_min_residency_refreshes: 12
  warmup_trend_reserve_min_ratio: 0.60
  reset_stats_on_refresh: true
  fallback_symbols: ["ETHUSDT"]
  # S5 live 只允许 replay symbol_tradeability 证明可交易的 canary 符号进入候选池。
  # 2026-06-11 full 报告中 ETHUSDT 为唯一 ROBUST/tradable，SOLUSDT 已被 source_symbol_not_tradable 阻断。
  candidate_symbols: ["ETHUSDT"]
